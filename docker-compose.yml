services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rizqhub
      POSTGRES_USER: rizqhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rizqhub -d rizqhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rizqhub:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/rizqhub
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:?NEXT_SERVER_ACTIONS_ENCRYPTION_KEY wajib diisi}
      XENDIT_SECRET_KEY: ${XENDIT_SECRET_KEY}
      XENDIT_WEBHOOK_TOKEN: ${XENDIT_WEBHOOK_TOKEN}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-false}
      STARSENDER_API_KEY: ${STARSENDER_API_KEY}
      MAILKETING_API_TOKEN: ${MAILKETING_API_TOKEN}
      MAILKETING_FROM_NAME: ${MAILKETING_FROM_NAME:-Rizqhub}
      MAILKETING_FROM_EMAIL: ${MAILKETING_FROM_EMAIL}
      INTERNAL_JOB_SECRET: ${INTERNAL_JOB_SECRET:?INTERNAL_JOB_SECRET wajib diisi dan minimal 32 karakter}
      BROADCAST_BATCH_SIZE: ${BROADCAST_BATCH_SIZE:-20}
      BROADCAST_DAILY_RECIPIENT_LIMIT: ${BROADCAST_DAILY_RECIPIENT_LIMIT:-500}
      OUTBOX_PROCESSING_ENABLED: ${OUTBOX_PROCESSING_ENABLED:-false}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      MANUAL_BANK_NAME: ${MANUAL_BANK_NAME:-BCA}
      MANUAL_BANK_ACCOUNT: ${MANUAL_BANK_ACCOUNT:-1234567890}
      MANUAL_BANK_HOLDER: ${MANUAL_BANK_HOLDER:-PT Rizqhub Indonesia}
      WORKSPACE_FOUNDATION_ENABLED: ${WORKSPACE_FOUNDATION_ENABLED:-false}
      WORKSPACE_CANARY_USER_IDS: ${WORKSPACE_CANARY_USER_IDS:-}
    volumes:
      - payment_proofs:/app/data/payment-proofs
      - commission_proofs:/app/data/commission-proofs
      - course_files:/app/data/course-files
      - landing_media:/app/data/landing-media
      - community_media:/app/data/community-media
      - service_documents:/app/data/service-documents
      - digital_products:/app/data/digital-products
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  payment_proofs:
  commission_proofs:
  course_files:
  landing_media:
  community_media:
  service_documents:
  digital_products:
