services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lajurin
      POSTGRES_USER: lajurin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lajurin -d lajurin"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://lajurin:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/lajurin
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
      XENDIT_SECRET_KEY: ${XENDIT_SECRET_KEY}
      XENDIT_WEBHOOK_TOKEN: ${XENDIT_WEBHOOK_TOKEN}
      MANUAL_BANK_NAME: ${MANUAL_BANK_NAME:-BCA}
      MANUAL_BANK_ACCOUNT: ${MANUAL_BANK_ACCOUNT:-1234567890}
      MANUAL_BANK_HOLDER: ${MANUAL_BANK_HOLDER:-PT Lajurin Indonesia}
    volumes:
      - payment_proofs:/app/data/payment-proofs
      - course_files:/app/data/course-files
      - landing_media:/app/data/landing-media
      - community_media:/app/data/community-media
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  payment_proofs:
  course_files:
  landing_media:
  community_media:
